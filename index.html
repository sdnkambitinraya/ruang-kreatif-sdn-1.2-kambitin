<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Kreatif SD Negeri 1.2 Kambitin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Sora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #7c3aed; --glass: rgba(255, 255, 255, 0.9); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e1b4b; }
        .hero-container { position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 1.5s ease; background-size: cover; background-position: center; z-index: -2; }
        .slide.active { opacity: 1; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(30, 27, 75, 0.7), rgba(248, 250, 252, 1)); z-index: -1; }
        .hero-title { font-family: 'Sora', sans-serif; color: white; text-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .glass-card { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 20px 40px rgba(49,46,129,0.1); transition: all 0.5s ease; }
        .glass-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(79,70,229,0.15); }
        .filter-pill { transition: all 0.3s ease; background: white; border: 1px solid #e2e8f0; font-weight: 700; }
        .filter-pill.active { background: #4338ca; color: white; border-color: #4338ca; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #4338ca; border-radius: 50%; animation: spin 1s linear infinite; }
        .bento-grid { display: grid; gap: 2rem; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 px-6 py-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center bg-white/80 backdrop-blur-md rounded-3xl px-8 py-4 shadow-xl border border-white/30">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-700 rounded-xl flex items-center justify-center text-white font-bold">R</div>
                <div>
                    <h1 class="font-extrabold text-lg leading-none text-indigo-950">Ruang Kreatif</h1>
                    <span class="text-[9px] uppercase tracking-widest text-emerald-700 font-black">SDN 1.2 Kambitin</span>
                </div>
            </div>
            <div class="hidden md:flex gap-8 font-bold text-sm text-indigo-900/80">
                <a href="#" class="hover:text-indigo-600">Beranda</a>
                <a href="#" class="hover:text-indigo-600">Koleksi</a>
            </div>
        </div>
    </nav>

    <header class="hero-container">
        <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=2000')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1497633762265-9d179a990aa6?q=80&w=2000')"></div>
        <div class="hero-overlay"></div>
        <div class="relative z-10 max-w-4xl mx-auto px-6 text-center text-white">
            <h1 class="hero-title text-5xl md:text-7xl font-black mb-8 leading-tight">Ruang Kreatif <br>SD Negeri 1.2 Kambitin</h1>
            <p class="text-xl md:text-2xl mb-12 font-bold italic">"Dari ruang kelas menuju kanvas dunia, inovasi tanpa batas."</p>
            <div class="relative max-w-2xl mx-auto">
                <input type="text" id="searchInput" placeholder="Cari karya seru..." class="w-full pl-14 pr-8 py-6 rounded-2xl border-none shadow-2xl text-indigo-950 text-lg font-bold">
                <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-indigo-600 w-6 h-6"></i>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-24">
        <div class="flex flex-wrap justify-center gap-3 mb-16">
            <button class="filter-pill active px-8 py-4 rounded-2xl text-xs uppercase" data-category="all">Semua</button>
            <button class="filter-pill px-8 py-4 rounded-2xl text-xs uppercase" data-category="Hasil Karya">🎨 Karya</button>
            <button class="filter-pill px-8 py-4 rounded-2xl text-xs uppercase" data-category="Game Interaktif">🎮 Game</button>
        </div>

        <div id="loadingState" class="flex flex-col items-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-indigo-900 font-bold">Memuat data secara aman...</p>
        </div>

        <div id="karyaGrid" class="bento-grid"></div>
    </main>

    <script>
        // GANTI URL INI DENGAN URL WEB APP BARU IBU
        const API_URL = "https://script.google.com/macros/s/AKfycbxpASNKjoVvxh9kzhagblcTIwIFzhmeZDQh9CcIa3Z-t8IiR3nTQdaY2ZvrAHo5Jw-1/exec"; 
        const API_TOKEN = "RUANG_KREATIF_12_TOKEN";
        
        let currentData = [];

        // Fungsi Teknik JSONP (Jurus Terakhir)
        function fetchDataJSONP() {
            const script = document.createElement('script');
            // Menambahkan callback=handleResponse agar browser tidak memblokir data
            script.src = `${API_URL}?token=${API_TOKEN}&callback=handleResponse&v=${new Date().getTime()}`;
            document.body.appendChild(script);
            
            // Batas waktu jika loading terlalu lama
            setTimeout(() => {
                if (currentData.length === 0) {
                    console.log("Menggunakan data cadangan...");
                    handleResponse([
                        { Judul_Karya: "Data Cadangan (Cek Koneksi)", Kategori: "Hasil Karya", Mata_Pelajaran: "Umum", Kelas: "Semua", Link_Media: "#", Link_Thumbnail: "", Deskripsi: "Sistem tidak bisa terhubung ke Google Sheets. Pastikan URL sudah benar." }
                    ]);
                }
            }, 8000);
        }

        // Fungsi yang dipanggil otomatis oleh JSONP
        window.handleResponse = function(data) {
            document.getElementById('loadingState').classList.add('hidden');
            currentData = Array.isArray(data) ? data : [];
            renderKarya();
        };

        function renderKarya(search = '', category = 'all') {
            const grid = document.getElementById('karyaGrid');
            grid.innerHTML = '';
            
            const filtered = currentData.filter(item => {
                const matchSearch = (item.Judul_Karya || "").toLowerCase().includes(search.toLowerCase());
                const matchCategory = category === 'all' || item.Kategori === category;
                return matchSearch && matchCategory;
            });

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = "glass-card rounded-[2.5rem] overflow-hidden flex flex-col p-4";
                card.innerHTML = `
                    <img src="${item.Link_Thumbnail || 'https://images.unsplash.com/photo-1594608661623-aa0bd3a67d28?q=80&w=800'}" class="w-full aspect-video object-cover rounded-[1.5rem] mb-6">
                    <div class="px-4 pb-4">
                        <span class="text-[10px] bg-indigo-100 text-indigo-700 px-3 py-1 rounded-lg font-bold uppercase mb-2 inline-block">${item.Kategori}</span>
                        <h3 class="font-bold text-xl text-indigo-950 mb-2">${item.Judul_Karya}</h3>
                        <p class="text-sm text-gray-500 mb-6 line-clamp-2">${item.Deskripsi || '-'}</p>
                        <a href="${item.Link_Media}" target="_blank" class="block w-full bg-indigo-600 text-white font-bold py-4 rounded-xl text-center">BUKA MEDIA</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            fetchDataJSONP();
            document.getElementById('searchInput').addEventListener('input', (e) => renderKarya(e.target.value));
            document.querySelectorAll('.filter-pill').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    renderKarya(document.getElementById('searchInput').value, this.dataset.category);
                });
            });
        });
    </script>
</body>
</html>
