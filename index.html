<!DOCTYPE html>
<html>
<head>
<title>Beranda</title>

<style>
.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

.left {
  width: 50%;
}

.right {
  width: 50%;
}

.box {
  background: #eee;
  padding: 15px;
  margin-bottom: 15px;
}
</style>

</head>

<body>

<div class="container">

  <!-- KIRI -->
  <div class="left">

    <div class="box">
      <h3>Identitas Sekolah</h3>
      <p>Nama: SDN Kamu</p>
      <p>Alamat: Isi alamat</p>
    </div>

    <div class="box">
      <h3>Map Sekolah</h3>
      <iframe 
        src="https://maps.google.com/maps?q=Pontianak&t=&z=13&output=embed"
        width="100%" height="200">
      </iframe>
    </div>

  </div>

  <!-- KANAN -->
  <div class="right">

    <div class="box">
      <h3>Highlight Berita</h3>
      <ul>
        <li>Berita 1</li>
        <li>Berita 2</li>
      </ul>
    </div>

  </div>

</div>

</body>
</html>
