<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD Negeri 1.2 Kambitin - Portal Resmi</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #7c3aed;
            --gold: #d6b15f;
            --glass: rgba(15, 23, 42, 0.7);
            --night-sky: #070b14;
        }

        body {
            margin: 0;
            background: var(--night-sky);
            color: #f1f5f9;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .stars-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .hero-container {
            display: flex;
            min-height: 70vh;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            background: linear-gradient(to bottom, transparent, var(--night-sky));
        }

        .glass-card {
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: var(--glass);
            backdrop-filter: blur(15px);
        }

        .filter-pill.active {
            background: var(--primary);
            color: white;
        }

        .loader {
            width: 40px; height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="stars-container" id="starsBox"></div>

    <nav class="fixed top-0 w-full z-50 px-4 py-2">
        <div class="max-w-7xl mx-auto flex justify-between items-center bg-slate-900/80 backdrop-blur-xl rounded-xl px-4 py-2 border border-white/10 shadow-2xl">
            <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                <div class="w-10 h-10 border border-white/20 rounded-lg flex items-center justify-center overflow-hidden bg-indigo-500">
                    <i class="fas fa-school text-white"></i>
                </div>
                <div>
                    <h1 class="font-bold text-xs text-white uppercase">SDN 1.2 Kambitin</h1>
                    <span class="block text-[7px] text-indigo-400 uppercase font-black">Portal Resmi</span>
                </div>
            </div>
            <div class="flex gap-4 text-[9px] font-black uppercase">
                <button onclick="setActiveTab('all')" class="text-white hover:text-indigo-400">Beranda</button>
                <button onclick="setActiveTab('Berita')" class="text-white hover:text-indigo-400">Artikel</button>
            </div>
        </div>
    </nav>

    <header id="hero-section" class="hero-container">
        <div class="relative z-10">
            <h1 class="text-4xl md:text-7xl font-black mb-4 text-white uppercase">SD NEGERI 1.2 <br> KAMBITIN</h1>
            <p class="italic text-indigo-300 text-sm md:text-lg">"Mengukir Prestasi Meraih Masa Depan Gemilang"</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 relative z-10">
        <div id="tab-menu" class="flex justify-center gap-2 mb-12">
            <button class="filter-pill active px-6 py-2 rounded-lg text-[10px] uppercase font-bold border border-white/10" onclick="setActiveTab('all')">Semua</button>
            <button class="filter-pill px-6 py-2 rounded-lg text-[10px] uppercase font-bold border border-white/10" onclick="setActiveTab('Berita')">Berita</button>
        </div>

        <div id="loadingState" class="flex flex-col items-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-slate-500 text-[10px] uppercase">Memuat Data...</p>
        </div>

        <div id="main-content-area" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        
        <div id="news-detail-view" class="hidden max-w-4xl mx-auto">
            <button onclick="closeNewsDetail()" class="mb-6 text-indigo-400 font-bold text-xs">← KEMBALI</button>
            <div id="news-content-full"></div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxq_QBlXPoFyxsyKHEkFg9JTxG1-OdVZvAWcRJwNgVjCumNQrpvMVC5KvhiI8rdIRc/exec';
        const API_TOKEN = 'RUANG_KREATIF_12_TOKEN';
        
        let allData = [];

        async function init() {
            try {
                const res = await fetch(`${API_URL}?token=${API_TOKEN}`);
                allData = await res.json();
                document.getElementById('loadingState').style.display = 'none';
                renderView('all');
            } catch (e) {
                console.error("Gagal ambil data", e);
                document.getElementById('loadingState').innerHTML = 'Gagal memuat data dari Spreadsheet.';
            }
            initStars();
        }

        function renderView(cat) {
            const container = document.getElementById('main-content-area');
            const hero = document.getElementById('hero-section');
            hero.style.display = (cat === 'all') ? 'flex' : 'none';
            container.innerHTML = '';

            const filtered = cat === 'all' ? allData : allData.filter(i => i.Kategori === cat);
            
            filtered.forEach((item, index) => {
                const img = item.Link_Thumbnail || 'https://via.placeholder.com/400x225/1e293b/ffffff?text=SDN+1.2';
                container.innerHTML += `
                    <div class="glass-card p-4 rounded-2xl cursor-pointer hover:bg-white/5 transition" onclick="showDetail(${index})">
                        <img src="${img}" class="w-full aspect-video object-cover rounded-xl mb-4">
                        <h3 class="font-bold text-white text-sm uppercase">${item.Judul_Karya}</h3>
                        <p class="text-slate-400 text-xs mt-2 line-clamp-2">${item.Deskripsi}</p>
                    </div>
                `;
            });
        }

        function setActiveTab(cat) {
            closeNewsDetail();
            renderView(cat);
        }

        function showDetail(idx) {
            const item = allData[idx];
            document.getElementById('main-content-area').classList.add('hidden');
            document.getElementById('tab-menu').classList.add('hidden');
            document.getElementById('news-detail-view').classList.remove('hidden');
            
            document.getElementById('news-content-full').innerHTML = `
                <h1 class="text-3xl font-bold mb-6">${item.Judul_Karya}</h1>
                <img src="${item.Link_Thumbnail}" class="w-full rounded-2xl mb-8">
                <div class="text-slate-300 leading-relaxed text-lg">${item.Deskripsi}</div>
            `;
            window.scrollTo(0,0);
        }

        function closeNewsDetail() {
            document.getElementById('main-content-area').classList.remove('hidden');
            document.getElementById('tab-menu').classList.remove('hidden');
            document.getElementById('news-detail-view').classList.add('hidden');
        }

        function initStars() {
            const box = document.getElementById('starsBox');
            for(let i=0; i<50; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random()*100+'%';
                s.style.top = Math.random()*100+'%';
                s.style.setProperty('--duration', Math.random()*3+2+'s');
                s.style.width = s.style.height = Math.random()*3+'px';
                box.appendChild(s);
            }
        }

        init();
    </script>
</body>
</html>
