<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD Negeri 1.2 Kambitin - Portal Resmi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:wght@700;900&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #7c3aed; 
            --glass: rgba(15, 23, 42, 0.7); 
            --night-sky: #070b14; 
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--night-sky); 
            color: #f1f5f9; 
            overflow-x: hidden;
            margin: 0;
        }

        /* Latar Belakang Bintang Bergerak */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px white; }
        }

        .font-serif { font-family: 'Playfair Display', serif; }
        .font-newspaper { font-family: 'Crimson Pro', serif; }
        
        .hero-container { 
            position: relative; 
            min-height: 70vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            padding-top: 60px;
        }

        /* Slideshow Background */
        .hero-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out, transform 8s ease-out;
            z-index: 0;
            transform: scale(1.1);
        }

        .hero-slide.active {
            opacity: 0.35; /* Kecerahan foto guru */
            z-index: 1;
            transform: scale(1);
        }
        
        .hero-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to bottom, transparent, var(--night-sky)); 
            z-index: 2; 
        }

        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.08); 
            transition: all 0.3s ease; 
        }
        
        .filter-pill { 
            transition: all 0.3s ease; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: #94a3b8; 
            font-weight: 700; 
            cursor: pointer; 
            white-space: nowrap;
        }

        .filter-pill.active { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary); 
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.4); 
        }
        
        .loader { 
            width: 40px; 
            height: 40px; 
            border: 4px solid rgba(255,255,255,0.1); 
            border-top-color: var(--primary); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        
        .bento-grid { 
            display: grid; 
            gap: 1rem; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
        }

        .fade-in { animation: fadeIn 0.5s ease forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .map-container {
            width: 100%;
            height: 250px;
            border-radius: 1.25rem;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .social-icon {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            color: white !important;
            text-decoration: none;
        }

        .social-icon:hover {
            background: var(--primary);
            transform: translateY(-3px);
        }

        .school-logo-container {
            width: 36px;
            height: 36px;
            background: white; 
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid var(--primary);
        }

        .tagline-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .tagline-main {
            font-family: 'Crimson Pro', serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            line-height: 1.4;
            color: transparent;
            background: linear-gradient(90deg, #a78bfa, #f472b6, #a78bfa);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 4s linear infinite;
        }

        @media (min-width: 768px) {
            .tagline-main {
                font-size: 1.25rem;
                letter-spacing: 0.2em;
            }
            .hero-container { min-height: 65vh; }
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .tagline-line {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        #tab-menu::-webkit-scrollbar { display: none; }
        #tab-menu { -ms-overflow-style: none; scrollbar-width: none; }

    </style>
</head>
<body>

    <div class="stars-container" id="starsBox"></div>

    <!-- Navigasi Utama -->
    <nav class="fixed top-0 w-full z-50 px-4 py-3 md:px-6 md:py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center bg-slate-900/80 backdrop-blur-xl rounded-xl md:rounded-2xl px-4 py-2 md:px-6 md:py-3 border border-white/10 shadow-2xl">
            <div class="flex items-center gap-3 cursor-pointer" onclick="setActiveTab('all')">
                <div class="school-logo-container">
                    <img id="mainLogo" src="" class="w-7 h-7 object-contain" alt="Logo Sekolah">
                </div>
                <div class="hidden xs:block">
                    <h1 class="font-extrabold text-[10px] md:text-xs text-white leading-tight uppercase">SDN 1.2 Kambitin</h1>
                    <span class="text-[6px] uppercase tracking-widest text-indigo-400 font-black">Portal Resmi</span>
                </div>
            </div>
            <div class="flex gap-3 md:gap-4 text-[8px] md:text-[9px] font-black uppercase tracking-widest">
                <button onclick="setActiveTab('all')" class="hover:text-indigo-400 transition text-white">Beranda</button>
                <button onclick="setActiveTab('Berita')" class="hover:text-indigo-400 transition text-white">Artikel</button>
                <button onclick="setActiveTab('Profil')" class="hover:text-indigo-400 transition text-white">Profil</button>
            </div>
        </div>
    </nav>

    <!-- Header Hero dengan Slideshow -->
    <header id="hero-section" class="hero-container">
        <!-- Slides akan diisi oleh JavaScript -->
        <div id="slideshow-wrapper" class="absolute inset-0 w-full h-full"></div>
        
        <div class="hero-overlay"></div>
        <div class="relative z-10 text-center px-6 max-w-5xl">
            <h1 class="text-3xl md:text-6xl lg:text-7xl font-black mb-4 md:mb-6 tracking-tighter text-white uppercase leading-none">
                SD NEGERI 1.2 <br class="md:hidden"> KAMBITIN
            </h1>
            
            <div class="tagline-container">
                <div class="tagline-line"></div>
                <p class="tagline-main px-2 md:px-4 text-center italic">
                    "Dari Ruang Kelas Menuju Cakrawala Dunia, Mengukir Prestasi Meraih Masa Depan Gemilang"
                </p>
                <div class="tagline-line"></div>
            </div>
            
            <div class="flex justify-center gap-3 md:gap-4 mt-8 md:mt-12">
                <a href="#" class="social-icon" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-icon" title="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-icon" title="YouTube"><i class="fab fa-youtube"></i></a>
                <a href="#" class="social-icon" title="TikTok"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-8 md:py-12 relative z-10">
        <div id="tab-menu" class="flex overflow-x-auto justify-start md:justify-center gap-2 mb-8 md:mb-12 pb-2">
            <button class="filter-pill active px-5 py-2 rounded-lg text-[8px] md:text-[9px] uppercase tracking-widest" data-category="all" onclick="setActiveTab('all')">Beranda</button>
            <button class="filter-pill px-5 py-2 rounded-lg text-[8px] md:text-[9px] uppercase tracking-widest" data-category="Berita" onclick="setActiveTab('Berita')">Artikel</button>
            <button class="filter-pill px-5 py-2 rounded-lg text-[8px] md:text-[9px] uppercase tracking-widest" data-category="Hasil Karya" onclick="setActiveTab('Hasil Karya')">Karya</button>
            <button class="filter-pill px-5 py-2 rounded-lg text-[8px] md:text-[9px] uppercase tracking-widest" data-category="Game Interaktif" onclick="setActiveTab('Game Interaktif')">Game</button>
            <button class="filter-pill px-5 py-2 rounded-lg text-[8px] md:text-[9px] uppercase tracking-widest" data-category="Profil" onclick="setActiveTab('Profil')">Profil</button>
        </div>

        <div id="news-detail-view" class="hidden fade-in max-w-4xl mx-auto mb-12 md:mb-20">
            <button onclick="closeNewsDetail()" class="mb-6 text-slate-400 hover:text-indigo-400 transition font-bold text-xs">← Kembali</button>
            <div id="news-content-full"></div>
        </div>

        <div id="loadingState" class="flex flex-col items-center py-10 md:py-20">
            <div class="loader mb-4"></div>
            <p class="text-slate-500 text-[8px] md:text-[10px] uppercase tracking-widest">Memuat Data...</p>
        </div>

        <div id="main-content-area" class="fade-in"></div>
    </main>

    <footer class="border-t border-white/5 py-8 md:py-12 mt-10 md:mt-20 bg-slate-950/50">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6 text-center md:text-left">
            <div>
                <h3 class="font-bold text-white text-xs md:text-sm uppercase">SD Negeri 1.2 Kambitin</h3>
                <p class="text-slate-500 text-[8px] md:text-[10px] uppercase tracking-widest mt-1">Kabupaten Tabalong, Kalsel</p>
            </div>
            <p class="text-slate-600 text-[8px] md:text-[9px] uppercase tracking-widest italic">&copy; 2024 SD Negeri 1.2 Kambitin</p>
        </div>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxq_QBlXPoFyxsyKHEkFg9JTxG1-OdVZvAWcRJwNgVjCumNQrpvMVC5KvhiI8rdIRc/exec"; 
        const API_TOKEN = "RUANG_KREATIF_12_TOKEN";
        
        /**
         * LOGO SEKOLAH
         */
        const LOGO_SEKOLAH = "https://drive.google.com/file/d/1V2UwCJtj-ZcvXPXRZm7Fw0_hzTaLpmT4/view?usp=drive_link";

        /**
         * FOTO GURU UNTUK SLIDESHOW
         * Masukkan link foto guru di sini.
         */
        const FOTO_GURU = [
            "https://images.unsplash.com/photo-1544717297-fa95b3396467?q=80&w=2000", 
            "https://images.unsplash.com/photo-1491843330757-37758135ca70?q=80&w=2000", 
            "https://images.unsplash.com/photo-1509062522246-3755977927d7?q=80&w=2000" 
        ];

        const DEFAULT_MAP = `<iframe class="w-full h-full" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15951.688267675765!2d115.39003316692225!3d-2.183492576082405!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2dfaa4407077a28b%3A0x8797f70b793675f9!2sSDN%201.2%20Kambitin!5e0!3m2!1sid!2sid!4v1710000000000!5m2!1sid!2sid" allowfullscreen="" loading="lazy"></iframe>`;

        let allData = [];
        let activeTab = 'all';
        let currentSlide = 0;

        function initStars() {
            const container = document.getElementById('starsBox');
            if(!container) return;
            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = (Math.random() * 2 + 1) + 'px';
                star.style.width = size; star.style.height = size;
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                container.appendChild(star);
            }
        }

        function formatImageUrl(url) {
            if (!url) return 'https://images.unsplash.com/photo-1594608661623-aa0bd3a67d28?q=80&w=800';
            if (url.includes('drive.google.com')) {
                const idMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
                if (idMatch && idMatch[1]) return `https://lh3.googleusercontent.com/d/${idMatch[1]}=s1000`;
            }
            return url;
        }

        // Fungsi Memulai Slideshow
        function initSlideshow() {
            const wrapper = document.getElementById('slideshow-wrapper');
            if (!wrapper) return;
            wrapper.innerHTML = ''; // Bersihkan sebelum isi

            FOTO_GURU.forEach((img, index) => {
                const slide = document.createElement('div');
                slide.className = `hero-slide ${index === 0 ? 'active' : ''}`;
                slide.style.backgroundImage = `url('${formatImageUrl(img)}')`;
                wrapper.appendChild(slide);
            });

            if(FOTO_GURU.length > 1) {
                setInterval(() => {
                    const slides = document.querySelectorAll('.hero-slide');
                    if(slides.length === 0) return;
                    slides[currentSlide].classList.remove('active');
                    currentSlide = (currentSlide + 1) % slides.length;
                    slides[currentSlide].classList.add('active');
                }, 6000); 
            }
        }

        async function loadData() {
            document.getElementById('mainLogo').src = formatImageUrl(LOGO_SEKOLAH);
            
            initStars();
            initSlideshow();

            try {
                const response = await fetch(`${API_URL}?token=${API_TOKEN}`);
                allData = await response.json();
            } catch (e) { console.warn("API Error."); }

            if (!allData || allData.length === 0 || allData.status === "error") {
                allData = [
                    { Kategori: "Profil", Judul_Karya: "Selamat Datang", Deskripsi: "SD Negeri 1.2 Kambitin berkomitmen mendidik siswa dengan kasih sayang dan inovasi.", Link_Thumbnail: "" },
                    { Kategori: "Berita", Judul_Karya: "Contoh Berita", Deskripsi: "Ini adalah tampilan contoh ketika data belum terhubung dengan Google Sheets...", Link_Thumbnail: "" }
                ];
            }
            document.getElementById('loadingState').classList.add('hidden');
            renderView();
        }

        window.setActiveTab = function(category) {
            activeTab = category;
            document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.toggle('active', btn.dataset.category === category));
            closeNewsDetail();
            const hero = document.getElementById('hero-section');
            if (hero) hero.style.display = (category === 'all') ? 'flex' : 'none';
            renderView();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.showNewsDetail = function(index) {
            const item = allData[index];
            document.getElementById('main-content-area').classList.add('hidden');
            document.getElementById('news-detail-view').classList.remove('hidden');
            document.getElementById('news-content-full').innerHTML = `
                <img src="${formatImageUrl(item.Link_Thumbnail)}" class="w-full h-[200px] md:h-[350px] object-cover rounded-2xl md:rounded-[2.5rem] mb-6 md:mb-8 shadow-2xl border border-white/10">
                <h2 class="font-serif text-2xl md:text-4xl text-white mb-4 md:mb-6">${item.Judul_Karya}</h2>
                <div class="font-newspaper text-base md:text-xl text-slate-300 leading-relaxed whitespace-pre-wrap">${item.Deskripsi}</div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.closeNewsDetail = function() {
            document.getElementById('main-content-area').classList.remove('hidden');
            document.getElementById('news-detail-view').classList.add('hidden');
        }

        function renderView() {
            const container = document.getElementById('main-content-area');
            if(!container) return;
            container.innerHTML = '';
            if (activeTab === 'all') renderHome(container);
            else if (activeTab === 'Berita') renderNewspaperView(container);
            else if (activeTab === 'Profil') renderProfil(container);
            else renderGrid(container, activeTab);
        }

        function renderHome(container) {
            const profilItems = allData.filter(i => i.Kategori === "Profil");
            const karyaItems = allData.filter(i => i.Kategori === "Hasil Karya").slice(0, 4);
            const newsItems = allData.filter(i => i.Kategori === "Berita").slice(0, 6);

            container.innerHTML = `
                <div class="flex flex-col lg:flex-row gap-8 md:gap-10">
                    <div class="lg:w-2/3 space-y-10 md:space-y-16">
                        <section class="space-y-4 md:space-y-6">
                            ${profilItems.map(item => `
                                <div class="glass-card p-6 md:p-10 rounded-2xl md:rounded-[2.5rem] border-l-4 border-indigo-600 shadow-2xl">
                                    <h2 class="font-serif text-2xl md:text-4xl text-white mb-4 md:mb-6">${item.Judul_Karya}</h2>
                                    <div class="text-slate-300 font-newspaper text-base md:text-xl leading-relaxed whitespace-pre-wrap">${item.Deskripsi}</div>
                                </div>
                            `).join('')}
                        </section>

                        <section>
                            <h3 class="font-serif text-xl md:text-2xl text-white mb-4 flex items-center gap-3">
                                <span class="w-6 md:w-8 h-[2px] bg-indigo-500"></span> Lokasi Sekolah
                            </h3>
                            <div class="map-container shadow-2xl">${DEFAULT_MAP}</div>
                        </section>

                        <section>
                            <div class="flex justify-between items-center mb-6 md:mb-8">
                                <h3 class="font-serif text-xl md:text-3xl text-white tracking-tighter uppercase">Karya Kreatif</h3>
                                <button onclick="setActiveTab('Hasil Karya')" class="text-indigo-400 text-[8px] font-black uppercase tracking-widest hover:underline">Semua →</button>
                            </div>
                            <div class="grid grid-cols-1 xs:grid-cols-2 gap-4 md:gap-6">
                                ${karyaItems.map(item => `
                                    <div class="glass-card rounded-xl md:rounded-[1.5rem] overflow-hidden p-3 md:p-4 group">
                                        <img src="${formatImageUrl(item.Link_Thumbnail)}" class="aspect-video w-full object-cover rounded-lg md:rounded-xl mb-3 md:mb-4 group-hover:scale-105 transition-all">
                                        <h4 class="font-bold text-white text-[10px] md:text-[11px] uppercase tracking-wider line-clamp-1">${item.Judul_Karya}</h4>
                                    </div>
                                `).join('')}
                            </div>
                        </section>
                    </div>

                    <aside class="lg:w-1/3 space-y-6 md:space-y-8">
                        <div class="sticky top-24">
                            <div class="flex justify-between items-end mb-4 md:mb-6">
                                <h3 class="font-serif text-xl md:text-2xl text-white flex items-center gap-3">
                                    <span class="w-6 md:w-8 h-[2px] bg-indigo-500"></span> Berita Terkini
                                </h3>
                            </div>
                            <div class="space-y-3 md:space-y-4">
                                ${newsItems.map(n => `
                                    <div onclick="showNewsDetail(${allData.indexOf(n)})" class="glass-card p-3 md:p-4 rounded-xl md:rounded-2xl cursor-pointer group hover:bg-white/5">
                                        <div class="flex gap-3 md:gap-4">
                                            <div class="w-12 h-12 md:w-16 md:h-16 flex-shrink-0">
                                                <img src="${formatImageUrl(n.Link_Thumbnail)}" class="w-full h-full object-cover rounded-lg md:rounded-xl grayscale group-hover:grayscale-0">
                                            </div>
                                            <div class="overflow-hidden">
                                                <h4 class="text-white font-bold text-[10px] md:text-[11px] leading-tight mb-1 line-clamp-2">${n.Judul_Karya}</h4>
                                                <p class="text-slate-500 text-[8px] md:text-[9px] line-clamp-1">Baca selengkapnya...</p>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </aside>
                </div>
            `;
        }

        function renderProfil(container) {
            const items = allData.filter(i => i.Kategori === "Profil");
            container.innerHTML = `
                <div class="max-w-4xl mx-auto space-y-8 md:space-y-10">
                    ${items.map(item => `
                        <div class="glass-card p-8 md:p-12 rounded-2xl md:rounded-[3rem]">
                            <h2 class="font-serif text-3xl md:text-5xl text-white mb-6 md:mb-8 text-center">${item.Judul_Karya}</h2>
                            <div class="text-slate-300 font-newspaper text-lg md:text-2xl leading-relaxed whitespace-pre-wrap">${item.Deskripsi}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderNewspaperView(container) {
            const news = allData.filter(i => i.Kategori === "Berita");
            container.innerHTML = `
                <div class="mb-8 md:mb-12"><h2 class="font-serif text-3xl md:text-5xl text-white uppercase text-center tracking-tighter">WARTA SEKOLAH</h2></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-10">
                    ${news.map(n => `
                        <div onclick="showNewsDetail(${allData.indexOf(n)})" class="flex flex-col xs:flex-row gap-4 md:gap-6 pb-6 md:pb-10 border-b border-white/5 cursor-pointer group">
                            <img src="${formatImageUrl(n.Link_Thumbnail)}" class="w-full xs:w-32 md:w-36 h-40 xs:h-32 md:h-36 flex-shrink-0 object-cover rounded-xl md:rounded-2xl group-hover:scale-105 transition-all">
                            <div>
                                <h3 class="text-xl md:text-2xl font-serif text-white mb-2 md:mb-3 group-hover:text-indigo-400 leading-tight">${n.Judul_Karya}</h3>
                                <p class="text-slate-500 text-sm md:text-base line-clamp-3 font-newspaper">${n.Deskripsi}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderGrid(container, cat) {
            const items = allData.filter(i => i.Kategori === cat);
            container.innerHTML = `
                <h2 class="font-serif text-2xl md:text-4xl text-white mb-8 md:mb-12 text-center uppercase tracking-tighter">${cat}</h2>
                <div class="bento-grid">
                    ${items.map(item => `
                        <div class="glass-card rounded-2xl md:rounded-[2.5rem] overflow-hidden p-4 md:p-6 group hover:border-indigo-500/40">
                            <img src="${formatImageUrl(item.Link_Thumbnail)}" class="aspect-video w-full object-cover rounded-xl md:rounded-2xl mb-4 md:mb-5 group-hover:scale-105 transition-all">
                            <h3 class="font-black text-white text-[10px] md:text-[12px] uppercase tracking-widest text-center">${item.Judul_Karya}</h3>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        window.onload = loadData;
    </script>
</body>
</html>
