<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD Negeri 1.2 Kambitin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:wght@700;900&family=Crimson+Pro:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #7c3aed; 
            --glass: rgba(15, 23, 42, 0.7); 
            --night-sky: #070b14; 
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--night-sky); 
            color: #f1f5f9; 
            overflow-x: hidden;
            margin: 0;
            position: relative;
        }

        /* ANIMASI BINTANG KELAP-KELIP */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px white; }
        }

        .font-serif { font-family: 'Playfair Display', serif; }
        .font-newspaper { font-family: 'Crimson Pro', serif; }
        
        .hero-container { 
            position: relative; 
            min-height: 55vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            padding-top: 80px;
        }
        
        .hero-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to bottom, rgba(7, 11, 20, 0.2), var(--night-sky)); 
            z-index: 2; 
        }

        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.08); 
            transition: all 0.3s ease; 
        }
        
        .filter-pill { transition: all 0.3s ease; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; font-weight: 700; cursor: pointer; }
        .filter-pill.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 20px rgba(124, 58, 237, 0.4); }
        
        .newspaper-header {
            text-align: center;
            border-bottom: 4px double rgba(255,255,255,0.2);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        .newspaper-container {
            border-top: 1px solid rgba(255,255,255,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding: 2.5rem 0;
        }

        .newspaper-grid {
            display: grid;
            grid-template-columns: 2.2fr 0.8fr;
            gap: 3rem;
        }

        @media (max-width: 1024px) {
            .newspaper-grid { grid-template-columns: 1fr; gap: 2rem; }
        }

        .col-divider {
            border-right: 1px solid rgba(255,255,255,0.1);
            padding-right: 2.5rem;
        }

        .newspaper-item {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .newspaper-item:hover h3, .newspaper-item:hover h4 { color: var(--primary); text-decoration: underline; }

        .sosmed-link {
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 10px;
        }
        .sosmed-link:hover { transform: translateY(-3px); background: var(--primary); border-color: var(--primary); }
        .sosmed-icon-img { width: 20px; height: 20px; object-fit: contain; filter: brightness(0) invert(1); }

        .loader { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .bento-grid { display: grid; gap: 1.5rem; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #lightbox { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; padding: 20px; }
        #lightbox.active { display: flex; animation: fadeIn 0.3s ease; }
    </style>
</head>
<body>

    <!-- Container Bintang -->
    <div class="stars-container" id="starsBox"></div>

    <div id="lightbox" onclick="this.classList.remove('active')">
        <img id="lightbox-img" src="" class="max-w-full max-h-full rounded-lg shadow-2xl object-contain">
    </div>

    <!-- Navigasi -->
    <nav class="fixed top-0 w-full z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center bg-slate-900/60 backdrop-blur-xl rounded-2xl px-6 py-3 border border-white/10 shadow-2xl">
            
            <div class="flex items-center gap-4 cursor-pointer" onclick="setActiveTab('all')">
                <img id="school-logo" 
                     src="https://drive.google.com/file/d/1V2UwCJtj-ZcvXPXRZm7Fw0_hzTaLpmT4/view?usp=drive_link" 
                     class="w-12 h-12 object-contain bg-white/5 rounded-xl p-1" 
                     alt="Logo Sekolah">
                <div>
                    <h1 class="font-extrabold text-sm text-white leading-tight">SD Negeri 1.2 Kambitin</h1>
                    <span class="text-[7px] uppercase tracking-widest text-indigo-400 font-black">Portal Kreativitas Digital</span>
                </div>
            </div>
            
            <div class="hidden lg:flex gap-2">
                <a href="https://facebook.com/sdn12kambitin" target="_blank" class="sosmed-link" title="Facebook">
                    <img src="https://img.icons8.com/ios-filled/50/ffffff/facebook-new.png" class="sosmed-icon-img" alt="Facebook">
                </a>
                <a href="https://www.instagram.com/sdn1.2kambitinn?igsh=dncweXoyMnFrY3hp" target="_blank" class="sosmed-link" title="Instagram">
                    <img src="https://img.icons8.com/ios-filled/50/ffffff/instagram-new.png" class="sosmed-icon-img" alt="Instagram">
                </a>
                <a href="https://www.tiktok.com/@sdn.1.2.kambitin?_r=1&_t=ZS-95sPz1f9Ryi" target="_blank" class="sosmed-link" title="TikTok">
                    <img src="https://img.icons8.com/ios-filled/50/ffffff/tiktok.png" class="sosmed-icon-img" alt="TikTok">
                </a>
                <a href="https://youtube.com/@sdnegeri1.2kambitin?si=LAarIoJkLAewmGkJ" target="_blank" class="sosmed-link" title="YouTube">
                    <img src="https://img.icons8.com/ios-filled/50/ffffff/youtube-play.png" class="sosmed-icon-img" alt="YouTube">
                </a>
            </div>

            <div class="flex gap-4 text-[9px] font-black uppercase tracking-widest">
                <button onclick="setActiveTab('all')" class="hover:text-indigo-400 transition">Beranda</button>
                <button onclick="setActiveTab('Berita')" class="hover:text-indigo-400 transition">Artikel</button>
                <button onclick="setActiveTab('Hasil Karya')" class="hover:text-indigo-400 transition hidden md:block">Karya</button>
            </div>
        </div>
    </nav>

    <header id="hero-section" class="hero-container">
        <div class="absolute inset-0 bg-cover bg-center opacity-30" style="background-image: url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=2000')"></div>
        <div class="hero-overlay"></div>
        <div class="relative z-10 text-center px-6">
            <h1 class="text-4xl md:text-7xl font-black mb-4 tracking-tighter text-white uppercase">SD Negeri 1.2 Kambitin</h1>
            <p class="text-indigo-300 font-bold text-xs md:text-sm uppercase tracking-[0.4em] mb-4 text-shadow-xl">
                Menyemai Karya dan Inspirasi dari Ruang Kelas Menuju Cakrawala Dunia
            </p>
            <div class="h-px w-24 bg-indigo-500 mx-auto mt-6 opacity-50"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 relative z-10">
        <div id="tab-menu" class="flex flex-wrap justify-center gap-3 mb-10">
            <button class="filter-pill active px-8 py-3 rounded-xl text-[10px] uppercase tracking-widest" data-category="all" onclick="setActiveTab('all')">🏠 Beranda</button>
            <button class="filter-pill px-8 py-3 rounded-xl text-[10px] uppercase tracking-widest" data-category="Profil" onclick="setActiveTab('Profil')">🏫 Profil</button>  
            <button class="filter-pill px-8 py-3 rounded-xl text-[10px] uppercase tracking-widest" data-category="Berita" onclick="setActiveTab('Berita')">📰 Artikel</button>
            <button class="filter-pill px-8 py-3 rounded-xl text-[10px] uppercase tracking-widest" data-category="Hasil Karya" onclick="setActiveTab('Hasil Karya')">🎨 Karya Siswa</button>
            <button class="filter-pill px-8 py-3 rounded-xl text-[10px] uppercase tracking-widest" data-category="Game Interaktif" onclick="setActiveTab('Game Interaktif')">🎮 Game</button>
        </div>

        <div id="news-detail-view" class="hidden fade-in max-w-4xl mx-auto mb-20">
            <button onclick="closeNewsDetail()" class="mb-8 flex items-center gap-2 text-slate-400 hover:text-indigo-400 transition font-bold text-sm">
                ← Kembali
            </button>
            <div id="news-content-full"></div>
        </div>

        <div id="loadingState" class="flex flex-col items-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-slate-500 animate-pulse text-xs uppercase tracking-widest">Sinkronisasi Data...</p>
        </div>

        <div id="main-content-area" class="fade-in"></div>
    </main>

    <footer class="border-t border-white/5 py-12 text-center mt-20">
        <div class="flex justify-center gap-4 mb-6">
             <a href="https://facebook.com/sdn12kambitin" target="_blank" class="sosmed-link">
                 <img src="https://img.icons8.com/ios-filled/50/ffffff/facebook-new.png" class="sosmed-icon-img" alt="Facebook">
             </a>
             <a href="https://www.instagram.com/sdn1.2kambitinn?igsh=dncweXoyMnFrY3hp" target="_blank" class="sosmed-link">
                 <img src="https://img.icons8.com/ios-filled/50/ffffff/instagram-new.png" class="sosmed-icon-img" alt="Instagram">
             </a>
             <a href="https://www.tiktok.com/@sdn.1.2.kambitin?_r=1&_t=ZS-95sPz1f9Ryi" target="_blank" class="sosmed-link">
                 <img src="https://img.icons8.com/ios-filled/50/ffffff/tiktok.png" class="sosmed-icon-img" alt="TikTok">
             </a>
             <a href="https://youtube.com/@sdnegeri1.2kambitin?si=LAarIoJkLAewmGkJ" target="_blank" class="sosmed-link">
                 <img src="https://img.icons8.com/ios-filled/50/ffffff/youtube-play.png" class="sosmed-icon-img" alt="YouTube">
             </a>
        </div>
        <p class="text-slate-600 text-[10px] uppercase tracking-widest italic">&copy; 2024 SD Negeri 1.2 Kambitin • Tabalong, Kalsel</p>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxWqWF6L4NtkNXnBw5ZPAIzglC_DABkTc4LT4YLbEylDfKsSpkImzIqsuKgjItxiuA/exec"; 
        const API_TOKEN = "RUANG_KREATIF_12_TOKEN";

        let allData = [];
        let activeTab = 'all';

        const LOGO_DRIVE_LINK = "https://drive.google.com/file/d/1V2UwCJtj-ZcvXPXRZm7Fw0_hzTaLpmT4/view?usp=sharing";

        // GENERATE BINTANG SECARA DINAMIS
        function initStars() {
            const container = document.getElementById('starsBox');
            const starCount = 100;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }

        function getTodayDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return new Date().toLocaleDateString('id-ID', options);
        }

        function formatImageUrl(url) {
            if (!url) return 'https://images.unsplash.com/photo-1594608661623-aa0bd3a67d28?q=80&w=800';
            if (url.includes('drive.google.com')) {
                const idMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
                if (idMatch && idMatch[1]) {
                    return `https://lh3.googleusercontent.com/d/${idMatch[1]}=s1000`;
                }
            }
            return url;
        }

        async function loadData() {
            try {
                initStars();
                const logoEl = document.getElementById('school-logo');
                if(logoEl) logoEl.src = formatImageUrl(LOGO_DRIVE_LINK);

                const response = await fetch(`${API_URL}?token=${API_TOKEN}`);
                allData = await response.json();
                document.getElementById('loadingState').classList.add('hidden');
                renderView();
            } catch (e) { console.error(e); }
        }

        window.setActiveTab = function(category) {
            activeTab = category;
            document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.toggle('active', btn.dataset.category === category));
            closeNewsDetail();
            const hero = document.getElementById('hero-section');
            if (hero) hero.style.display = (category === 'all') ? 'flex' : 'none';
            renderView();
        }

        function renderView() {
            const container = document.getElementById('main-content-area');
            if (!container) return;
            container.innerHTML = '';
            if (activeTab === 'all') renderHome(container);
            else if (activeTab === 'Berita') renderNewspaperView(container);
            else if (activeTab === 'Profil') renderProfil(container);
            else renderGrid(container, activeTab);
        }

        function renderHome(container) {
            const profil = allData.find(item => item.Kategori === "Tentang Sekolah") || {Judul_Karya: "Selamat Datang", Deskripsi: "SD Negeri 1.2 Kambitin adalah wadah literasi digital bagi siswa."};
            const karyaTerbaru = allData.filter(item => item.Kategori === "Hasil Karya").slice(0, 3);

            container.innerHTML = `
                <div class="flex flex-col gap-16">
                    <section class="glass-card p-10 rounded-[3rem] border-indigo-500/20 relative overflow-hidden">
                        <div class="absolute -top-24 -right-24 w-64 h-64 bg-indigo-600/10 blur-[100px] rounded-full"></div>
                        <div class="relative z-10">
                            <span class="text-indigo-400 font-black text-[10px] uppercase tracking-widest mb-4 block">Tentang Kami</span>
                            <h2 class="font-serif text-4xl md:text-5xl text-white mb-6 uppercase tracking-tighter">${profil.Judul_Karya}</h2>
                            <div class="font-newspaper text-slate-300 text-xl md:text-2xl leading-relaxed italic whitespace-pre-wrap">${profil.Deskripsi}</div>
                        </div>
                    </section>

                    <section>
                        <div class="flex justify-between items-end mb-8 border-b border-white/10 pb-4">
                            <div>
                                <h3 class="text-white font-black text-2xl uppercase tracking-tighter">Karya Siswa Terbaru</h3>
                                <p class="text-slate-500 text-xs uppercase tracking-widest mt-1">Kreativitas tanpa batas di ruang digital</p>
                            </div>
                            <button onclick="setActiveTab('Hasil Karya')" class="text-indigo-400 font-bold text-[10px] uppercase tracking-widest hover:underline">Lihat Semua →</button>
                        </div>
                        <div class="bento-grid">
                            ${karyaTerbaru.map(item => `
                                <div class="glass-card rounded-3xl overflow-hidden p-4">
                                    <img src="${formatImageUrl(item.Link_Thumbnail)}" class="aspect-square object-cover rounded-2xl mb-4 grayscale hover:grayscale-0 transition-all duration-500">
                                    <h3 class="font-bold text-white text-sm uppercase tracking-tighter">${item.Judul_Karya}</h3>
                                </div>`).join('')}
                        </div>
                    </section>
                </div>`;
        }

        function renderNewspaperView(container) {
            const news = allData.filter(item => item.Kategori === "Berita");
            if (news.length === 0) return;
            
            const utama = news[0];
            const subUtama = news.slice(1, 3);
            const highlights = news.slice(3, 8);

            container.innerHTML = `
                <div class="newspaper-header">
                    <h2 class="font-serif text-6xl md:text-8xl text-white tracking-tighter uppercase font-black">WARTA SEKOLAH</h2>
                    <div class="flex justify-between items-center mt-2 px-1 border-t border-white/20 pt-2">
                        <span class="text-[10px] font-black uppercase text-indigo-400 tracking-widest">Edisi Digital No. 1.2</span>
                        <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">${getTodayDate()}</span>
                    </div>
                </div>

                <div class="newspaper-container">
                    <div class="newspaper-grid">
                        <div class="col-divider">
                            <div class="newspaper-item mb-10" onclick="openNewsDetail(0)">
                                <div class="mb-4">
                                    <span class="bg-indigo-600 text-white text-[10px] font-black px-3 py-1 uppercase tracking-widest rounded">Artikel Utama</span>
                                </div>
                                <h3 class="font-serif text-5xl text-white mb-6 uppercase tracking-tighter leading-[0.95]">${utama.Judul_Karya}</h3>
                                <img src="${formatImageUrl(utama.Link_Thumbnail)}" class="w-full aspect-video object-cover rounded-xl mb-6 shadow-2xl grayscale-[20%] hover:grayscale-0 transition-all duration-500">
                                <p class="font-newspaper text-slate-300 text-2xl leading-relaxed italic mb-4 line-clamp-4 underline decoration-white/10 underline-offset-8">
                                    ${utama.Deskripsi}
                                </p>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 border-t border-white/10 pt-8">
                                ${subUtama.map((item, idx) => `
                                    <div class="newspaper-item" onclick="openNewsDetail(${idx + 1})">
                                        <img src="${formatImageUrl(item.Link_Thumbnail)}" class="w-full aspect-video object-cover rounded-lg mb-4 shadow-lg grayscale-[20%] hover:grayscale-0 transition-all duration-500">
                                        <h4 class="font-serif text-2xl text-white mb-2 leading-tight uppercase tracking-tighter line-clamp-2">${item.Judul_Karya}</h4>
                                        <p class="text-sm text-slate-400 font-newspaper line-clamp-3 italic">${item.Deskripsi}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="flex flex-col gap-6">
                            <h5 class="text-indigo-400 font-black text-[11px] uppercase tracking-[0.3em] border-b border-white/20 pb-2 mb-2">Highlight Terbaru</h5>
                            ${highlights.map((item, idx) => `
                                <div class="newspaper-item flex gap-4 group" onclick="openNewsDetail(${idx + 3})">
                                    <div class="w-20 h-20 flex-shrink-0">
                                        <img src="${formatImageUrl(item.Link_Thumbnail)}" class="w-full h-full object-cover rounded-lg shadow-md group-hover:scale-105 transition-transform">
                                    </div>
                                    <div class="flex flex-col justify-center">
                                        <h4 class="font-serif text-lg text-white mb-1 leading-tight uppercase tracking-tighter line-clamp-2">${item.Judul_Karya}</h4>
                                        <p class="text-[10px] text-slate-500 font-newspaper line-clamp-2 italic">${item.Deskripsi}</p>
                                    </div>
                                </div>
                                <div class="h-px bg-white/5 w-full last:hidden"></div>
                            `).join('')}
                        </div>
                    </div>
                </div>`;
        }

        function renderProfil(container) {
            const items = allData.filter(item => item.Kategori === "Tentang Sekolah");
            container.innerHTML = `<div class="max-w-2xl mx-auto flex flex-col gap-6">
                ${items.map(p => `<div class="glass-card p-8 rounded-3xl"><h3 class="text-xl font-bold text-indigo-400 mb-4 uppercase tracking-widest text-xs">${p.Judul_Karya}</h3><div class="text-slate-300 font-newspaper text-lg whitespace-pre-wrap">${p.Deskripsi}</div></div>`).join('')}
            </div>`;
        }

        function renderGrid(container, cat) {
            const items = allData.filter(item => item.Kategori === cat);
            container.innerHTML = `<div class="bento-grid">
                ${items.map(item => `
                    <div class="glass-card rounded-3xl overflow-hidden p-4 flex flex-col">
                        <img src="${formatImageUrl(item.Link_Thumbnail)}" class="aspect-video object-cover rounded-2xl mb-4">
                        <h3 class="font-bold text-white mb-2 text-sm uppercase tracking-tighter">${item.Judul_Karya}</h3>
                        ${item.Link_Media ? `<a href="${item.Link_Media}" target="_blank" class="mt-auto block w-full py-2 bg-indigo-600 text-center rounded-xl text-[10px] font-black text-white uppercase tracking-widest">Buka</a>` : ''}
                    </div>`).join('')}
            </div>`;
        }

        window.openNewsDetail = function(index) {
            const newsList = allData.filter(item => item.Kategori === "Berita");
            const item = newsList[index];
            document.getElementById('news-content-full').innerHTML = `
                <img src="${formatImageUrl(item.Link_Thumbnail)}" class="w-full rounded-3xl mb-8 shadow-2xl border border-white/10">
                <h1 class="font-serif text-5xl text-white mb-6 uppercase tracking-tighter leading-tight">${item.Judul_Karya}</h1>
                <div class="font-newspaper text-slate-200 text-2xl leading-relaxed whitespace-pre-wrap italic">${item.Deskripsi}</div>`;
            document.getElementById('main-content-area').classList.add('hidden');
            document.getElementById('tab-menu').classList.add('hidden');
            document.getElementById('news-detail-view').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.closeNewsDetail = function() {
            document.getElementById('news-detail-view').classList.add('hidden');
            document.getElementById('main-content-area').classList.remove('hidden');
            document.getElementById('tab-menu').classList.remove('hidden');
        }

        window.onload = loadData;
    </script>
</body>
</html>
