<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SD Negeri 1.2 Kambitin</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: #070b14;
    color: white;
    font-family: Arial;
    margin: 0;
}
.glass-card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 20px;
}
</style>
</head>

<body>

<!-- HEADER (TIDAK DIHAPUS) -->
<header style="text-align:center; padding:20px;">
    <h1 style="font-size:28px; font-weight:bold;">SD Negeri 1.2 Kambitin</h1>
    <p style="font-size:12px;">Portal Kreativitas Digital</p>
</header>

<main class="max-w-6xl mx-auto p-6">
    <div id="main-content-area">Loading...</div>
</main>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzDApoLc6to61gKpj9tDaI3UgOOkMnliTMhPqlM1H9kDCc4kzjd3Rcl1TY3nVq_eM8K/exec";
const API_TOKEN = "RUANG_KREATIF_12_TOKEN";

let allData = [];

// ambil data dari spreadsheet
async function loadData() {
    try {
        const res = await fetch(API_URL + "?token=" + API_TOKEN);
        allData = await res.json();

        console.log("DATA:", allData);

        renderHome();
    } catch (err) {
        console.error(err);
        document.getElementById("main-content-area").innerHTML = "Gagal ambil data";
    }
}

// tampilkan beranda
function renderHome() {

    // 🔥 ambil profil sesuai spreadsheet kamu
    const profil = allData.find(d =>
        d.Kategori === "Profil" && d.Judul_Karya === "Identitas Sekolah"
    );

    const berita = allData.filter(d => d.Kategori === "Berita");

    document.getElementById("main-content-area").innerHTML = `
    <div class="grid md:grid-cols-2 gap-6">

        <!-- KIRI -->
        <div class="flex flex-col gap-6">

            <div class="glass-card">
                <h2 class="font-bold mb-2">Identitas Sekolah</h2>
                <p>${profil ? profil.Deskripsi : ""}</p>
            </div>

            <div class="glass-card">
                <h2 class="font-bold mb-2">Lokasi Sekolah</h2>
                <iframe 
                    src="https://maps.google.com/maps?q=Tabalong&output=embed"
                    class="w-full h-64 rounded-lg">
                </iframe>
            </div>

        </div>

        <!-- KANAN -->
        <div class="glass-card">

            <h2 class="font-bold mb-4">Highlight Berita</h2>

            ${
                berita.length > 0
                ? berita.map(item => `
                    <div style="margin-bottom:15px">
                        <b>${item.Judul_Karya}</b><br>
                        <small>${item.Deskripsi}</small>
                    </div>
                `).join("")
                : "Belum ada berita"
            }

        </div>

    </div>
    `;
}

loadData();
</script>

</body>
</html>
