<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD Negeri 1.2 Kambitin - Portal Resmi</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #7c3aed;
            --gold: #d6b15f;
            --glass: rgba(15, 23, 42, 0.7);
            --night-sky: #070b14;
        }

        body {
            margin: 0;
            overflow-x: hidden;
            background: var(--night-sky);
            color: #f1f5f9;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* --- BACKGROUND STARS --- */
        .stars-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px white; }
        }

        /* --- HERO SECTION LUXURY --- */
        .hero-container {
            position: relative;
            display: flex;
            min-height: 70vh;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding-top: 60px;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
            background: linear-gradient(to bottom, transparent, var(--night-sky));
        }

        .tagline-main {
            background: linear-gradient(90deg, #a78bfa, #f472b6, #a78bfa);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        /* --- CARD LUXURY FRAME --- */
        .glass-card {
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: var(--glass);
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .luxury-frame::before {
            content: "";
            position: absolute;
            top: 12px; left: 12px; width: 25px; height: 25px;
            border-top: 1.5px solid var(--gold); border-left: 1.5px solid var(--gold);
        }

        .luxury-frame::after {
            content: "";
            position: absolute;
            bottom: 12px; right: 12px; width: 25px; height: 25px;
            border-bottom: 1.5px solid var(--gold); border-right: 1.5px solid var(--gold);
        }

        .filter-pill.active {
            background: linear-gradient(135deg, var(--primary), #5b21b6);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
        }

        .loader {
            width: 45px; height: 45px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        /* === MODE SIANG (GLASS MORNING) === */
body.day-mode {
    background: linear-gradient(to top, #aee2ff, #f0fbff);
    color: #1e293b;
}

/* kartu jadi kaca terang */
body.day-mode .glass-card {
    background: rgba(255, 255, 255, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(20px);
}

/* navbar jadi terang */
body.day-mode nav div {
    background: rgba(255,255,255,0.6) !important;
    border: 1px solid rgba(0,0,0,0.05);
}


/* hilangkan bintang */
body.day-mode .stars-container {
    display: none;
}
    </style>
</head>
<body class="day-mode">
    <div class="stars-container" id="starsBox"></div>

    <!-- NAVBAR -->
    <nav class="fixed top-0 w-full z-50 px-4 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center bg-slate-900/80 backdrop-blur-xl rounded-2xl px-6 py-2 border border-white/10 shadow-2xl">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
                <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center border border-white/20">
                    <i class="fas fa-graduation-cap text-white"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-xs text-white uppercase tracking-tight">SDN 1.2 Kambitin</h1>
                    <span class="block text-[8px] tracking-widest text-indigo-400 uppercase font-black">Official Portal</span>
                </div>
            </div>
            <div class="flex gap-6 text-[10px] font-bold uppercase tracking-widest">
                <button onclick="setActiveTab('all')" class="text-white hover:text-indigo-400 transition">Beranda</button>
                <button onclick="setActiveTab('Berita')" class="text-white hover:text-indigo-400 transition">Berita</button>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <header id="hero-section" class="hero-container">
        <div class="hero-overlay"></div>
        <div class="relative z-10 text-center px-6">
            <h1 class="text-5xl md:text-8xl font-black mb-4 tracking-tighter text-white uppercase leading-none">
                SD NEGERI 1.2<br><span class="text-indigo-500">KAMBITIN</span>
            </h1>
            <p class="tagline-main italic text-sm md:text-xl font-medium max-w-2xl mx-auto">
                "Dari Ruang Kelas Menuju Cakrawala Dunia, Mengukir Prestasi Meraih Masa Depan Gemilang"
            </p>
        </div>
    </header>

    <!-- CONTENT -->
    <main class="max-w-7xl mx-auto px-6 py-12 relative z-10">
        <div id="tab-menu" class="flex justify-center gap-3 mb-16">
            <button class="filter-pill active px-8 py-2.5 rounded-full text-[10px] uppercase font-black tracking-widest bg-white/5 border border-white/10 text-white" onclick="setActiveTab('all')" data-cat="all">Semua</button>
            <button class="filter-pill px-8 py-2.5 rounded-full text-[10px] uppercase font-black tracking-widest bg-white/5 border border-white/10 text-white" onclick="setActiveTab('Berita')" data-cat="Berita">Berita</button>
        </div>

        <div id="loadingState" class="flex flex-col items-center py-20">
            <div class="loader mb-6"></div>
            <p class="text-indigo-400 text-xs font-bold uppercase tracking-[0.2em]">Sinkronisasi Data...</p>
        </div>

        <div id="main-content-area" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        
        <div id="news-detail-view" class="hidden max-w-4xl mx-auto">
            <button onclick="closeNewsDetail()" class="group mb-8 text-indigo-400 font-black text-xs uppercase tracking-widest flex items-center gap-2">
                <i class="fas fa-arrow-left transition-transform group-hover:-translate-x-1"></i> Kembali ke Galeri
            </button>
            <div id="news-content-full" class="bg-slate-900/50 p-8 rounded-3xl border border-white/10 backdrop-blur-md"></div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxq_QBlXPoFyxsyKHEkFg9JTxG1-OdVZvAWcRJwNgVjCumNQrpvMVC5KvhiI8rdIRc/exec';
        const API_TOKEN = 'RUANG_KREATIF_12_TOKEN';
        
        let allData = [];

        async function init() {
            try {
                const res = await fetch(`${API_URL}?token=${API_TOKEN}`);
                allData = await res.json();
                document.getElementById('loadingState').style.display = 'none';
                renderView('all');
            } catch (e) {
                console.error("Fetch Error:", e);
                document.getElementById('loadingState').innerHTML = '<p class="text-red-400 uppercase text-xs font-bold">Koneksi Database Terputus</p>';
            }
            initStars();
        }

        function renderView(cat) {
            const container = document.getElementById('main-content-area');
            const hero = document.getElementById('hero-section');
            hero.style.display = (cat === 'all') ? 'flex' : 'none';
            container.innerHTML = '';

            const filtered = cat === 'all' ? allData : allData.filter(i => i.Kategori === cat);
            
            filtered.forEach((item, index) => {
                const img = item.Link_Thumbnail || 'https://images.unsplash.com/photo-1580582932707-520aed937b7b?q=80&w=1000';
                container.innerHTML += `
                    <div class="glass-card luxury-frame p-5 rounded-2xl cursor-pointer hover:shadow-[0_0_30px_rgba(124,58,237,0.2)]" onclick="showDetail(${index})">
                        <div class="overflow-hidden rounded-xl mb-5">
                            <img src="${img}" class="w-full aspect-video object-cover hover:scale-110 transition duration-700">
                        </div>
                        <span class="text-[9px] text-gold font-black uppercase tracking-[0.2em] mb-2 block">${item.Kategori}</span>
                        <h3 class="font-extrabold text-white text-base leading-snug uppercase tracking-tight">${item.Judul_Karya}</h3>
                        <p class="text-slate-400 text-xs mt-3 line-clamp-2 font-light">${item.Deskripsi}</p>
                    </div>
                `;
            });
        }

        function setActiveTab(cat) {
            document.querySelectorAll('.filter-pill').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('onclick').includes(cat));
            });
            closeNewsDetail();
            renderView(cat);
        }

        function showDetail(idx) {
            const item = allData[idx];
            document.getElementById('main-content-area').classList.add('hidden');
            document.getElementById('tab-menu').classList.add('hidden');
            document.getElementById('news-detail-view').classList.remove('hidden');
            
            document.getElementById('news-content-full').innerHTML = `
                <h1 class="text-4xl font-black text-white mb-4 uppercase tracking-tighter">${item.Judul_Karya}</h1>
                <div class="h-1 w-20 bg-indigo-500 mb-8"></div>
                <img src="${item.Link_Thumbnail}" class="w-full rounded-2xl mb-8 shadow-2xl border border-white/10">
                <div class="prose prose-invert max-w-none">
                    <p class="text-slate-300 leading-relaxed text-lg font-light">${item.Deskripsi}</p>
                </div>
            `;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function closeNewsDetail() {
            document.getElementById('main-content-area').classList.remove('hidden');
            document.getElementById('tab-menu').classList.remove('hidden');
            document.getElementById('news-detail-view').classList.add('hidden');
        }

        function initStars() {
            const box = document.getElementById('starsBox');
            for(let i=0; i<100; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random()*100+'%';
                s.style.top = Math.random()*100+'%';
                s.style.width = s.style.height = Math.random()*2+1+'px';
                s.style.setProperty('--duration', Math.random()*3+2+'s');
                box.appendChild(s);
            }
        }

        init();
    </script>
</body>
</html>
