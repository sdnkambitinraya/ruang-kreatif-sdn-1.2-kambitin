<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD Negeri 1.2 Kambitin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:wght@700;900&family=Crimson+Pro:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #7c3aed; 
            --glass: rgba(15, 23, 42, 0.7); 
            --night-sky: #070b14; 
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--night-sky); 
            color: #f1f5f9; 
            overflow-x: hidden;
            margin: 0;
        }

        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.08); 
        }
    </style>
</head>

<body>

<main class="max-w-7xl mx-auto px-6 py-12">

<div id="main-content-area"></div>

</main>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzDApoLc6to61gKpj9tDaI3UgOOkMnliTMhPqlM1H9kDCc4kzjd3Rcl1TY3nVq_eM8K/exec"; 
const API_TOKEN = "RUANG_KREATIF_12_TOKEN";

let allData = [];

async function loadData() {
    const res = await fetch(`${API_URL}?token=${API_TOKEN}`);
    allData = await res.json();
    renderHome(document.getElementById("main-content-area"));
}

/* ============================= */
/* 🔥 INI BAGIAN YANG DIPERBAIKI */
/* ============================= */
function renderHome(container) {

    const profil = allData.find(item => item.Kategori === "Tentang Sekolah");
    const berita = allData.filter(item => item.Kategori === "Berita").slice(0,5);

    container.innerHTML = `
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

        <!-- KIRI -->
        <div class="flex flex-col gap-6">

            <div class="glass-card p-6 rounded-3xl">
                <h3 class="text-indigo-400 text-xs uppercase mb-2">Identitas Sekolah</h3>
                <h2 class="text-xl font-bold">SD Negeri 1.2 Kambitin</h2>
                <p class="text-slate-300 text-sm mt-2">
                    ${profil ? profil.Deskripsi : "Profil belum ada"}
                </p>
            </div>

            <div class="glass-card p-4 rounded-3xl">
                <h3 class="text-indigo-400 text-xs uppercase mb-2">Lokasi</h3>
                <iframe 
                    src="https://maps.google.com/maps?q=Tabalong&output=embed"
                    class="w-full h-64 rounded-xl">
                </iframe>
            </div>

        </div>

        <!-- KANAN -->
        <div class="glass-card p-6 rounded-3xl">

            <h3 class="text-indigo-400 text-xs uppercase mb-4">Highlight Berita</h3>

            ${berita.map((item,i)=>`
                <div style="margin-bottom:15px; cursor:pointer" onclick="alert('Detail berita nanti bisa kita buat')">
                    <b>${item.Judul_Karya}</b><br>
                    <small>${item.Deskripsi}</small>
                </div>
            `).join('')}

        </div>

    </div>
    `;
}

loadData();
</script>

</body>
</html>
