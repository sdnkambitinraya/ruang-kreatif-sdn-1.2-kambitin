<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD Negeri 1.2 Kambitin - Ruang Kreatif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Sora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --primary: #7c3aed; 
            --glass: rgba(15, 23, 42, 0.7); 
            --night-sky: #070b14; 
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--night-sky); 
            color: #f1f5f9; 
            overflow-x: hidden;
        }
        
        .hero-container { 
            position: relative; 
            min-height: 65vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            padding-top: 80px;
        }
        
        .slide { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            opacity: 0; transition: opacity 2s ease-in-out; 
            background-size: cover; background-position: center; 
            z-index: 1;
            transform: scale(1.1);
        }
        
        .slide.active { 
            opacity: 1; 
            transform: scale(1);
            transition: opacity 2s ease-in-out, transform 10s linear;
        }
        
        .hero-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to bottom, rgba(7, 11, 20, 0.2), var(--night-sky)); 
            z-index: 2; 
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(circle at center, #111827 0%, #070b14 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.08); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
            transition: all 0.5s ease; 
        }
        .glass-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        
        .filter-pill { transition: all 0.3s ease; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; font-weight: 700; }
        .filter-pill.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 20px rgba(124, 58, 237, 0.4); }
        
        .class-pill { transition: all 0.3s ease; background: rgba(124, 58, 237, 0.1); border: 1px solid rgba(124, 58, 237, 0.2); color: #a78bfa; font-weight: 600; font-size: 0.75rem; }
        .class-pill.active { background: #a78bfa; color: #070b14; border-color: #a78bfa; }

        .loader { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .bento-grid { display: grid; gap: 1.5rem; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }

        .social-icon-btn {
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 12px;
            color: #cbd5e1;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.75rem;
            font-weight: 700;
        }

        .social-icon-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        /* Lightbox Styles */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #lightbox.active {
            display: flex;
            opacity: 1;
        }
        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        #lightbox.active img {
            transform: scale(1);
        }
        .close-lightbox {
            position: absolute;
            top: 20px; right: 20px;
            color: white;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 50%;
            transition: background 0.3s;
        }
        .close-lightbox:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="stars" class="stars-container"></div>

    <!-- Lightbox Modal -->
    <div id="lightbox" onclick="closeLightbox()">
        <div class="close-lightbox">
            <i data-lucide="x" class="w-6 h-6"></i>
        </div>
        <img id="lightboxImg" src="" alt="Full Screen" onclick="event.stopPropagation()">
    </div>

    <!-- Navigasi -->
    <nav class="fixed top-0 w-full z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center bg-slate-900/60 backdrop-blur-xl rounded-2xl px-6 py-3 shadow-2xl border border-white/10">
            <div class="flex items-center gap-3">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/9c/Logo_of_Ministry_of_Education_and_Culture_of_Republic_of_Indonesia.svg" alt="Logo" class="w-8 h-8 object-contain">
                <div>
                    <h1 class="font-extrabold text-sm leading-none text-white">SDN 1.2 Kambitin</h1>
                    <span class="text-[7px] uppercase tracking-widest text-indigo-400 font-black">Portal Resmi</span>
                </div>
            </div>
            <div class="flex items-center gap-4 sm:gap-8">
                <div class="hidden sm:flex gap-6 font-bold text-[10px] uppercase tracking-widest text-slate-400">
                    <a href="javascript:void(0)" onclick="setTab('all')" class="hover:text-white transition-colors">Beranda</a>
                    <a href="javascript:void(0)" onclick="setTab('Profil')" class="hover:text-white transition-colors">Profil</a>
                    <a href="javascript:void(0)" onclick="setTab('Hasil Karya')" class="hover:text-white transition-colors">Galeri</a>
                </div>
                <div class="pl-4 border-l border-white/10">
                    <span class="text-xs font-black text-indigo-400 tracking-tighter">Ruang Kreatif</span>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero-container">
        <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=2000')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1509062522246-3755977927d7?q=80&w=2000')"></div>
        <div class="hero-overlay"></div>

        <div class="relative z-10 max-w-5xl mx-auto px-6 text-center text-white">
            <p class="text-[10px] md:text-xs mb-4 font-bold text-indigo-300 opacity-90 uppercase tracking-[0.5em]">Selamat Datang di</p>
            <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tighter">SD Negeri 1.2 Kambitin</h1>
            <p class="text-sm md:text-lg mb-10 font-medium text-slate-300 italic max-w-2xl mx-auto leading-relaxed">
                "Dari ruang kelas menuju kanvas dunia, inspirasi tanpa batas."
            </p>
            
            <div class="flex flex-wrap items-center justify-center gap-3 mb-10">
                <a href="#" class="social-icon-btn"><i data-lucide="youtube" class="w-4 h-4 text-red-500"></i><span>YouTube</span></a>
                <a href="#" class="social-icon-btn">
                    <svg class="w-4 h-4 fill-current text-white" viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.03 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.9-.32-1.98-.23-2.8.2-.67.33-1.14 1.02-1.24 1.76-.1.48-.09.97-.02 1.46.1.47.34.91.67 1.25.5.44 1.15.6 1.8.58 1.2-.01 2.26-1.01 2.26-2.21-.01-4.71-.01-9.41-.01-14.12z"/></svg>
                    <span>TikTok</span>
                </a>
                <a href="#" class="social-icon-btn"><i data-lucide="instagram" class="w-4 h-4 text-pink-500"></i><span>Instagram</span></a>
                <a href="#" class="social-icon-btn"><i data-lucide="facebook" class="w-4 h-4 text-blue-600"></i><span>Facebook</span></a>
            </div>

            <div class="relative max-w-xl mx-auto">
                <input type="text" id="searchInput" placeholder="Cari karya atau info sekolah..." class="w-full pl-12 pr-6 py-4 rounded-xl border border-white/20 shadow-2xl bg-black/40 backdrop-blur-md text-white font-bold outline-none placeholder:text-slate-500">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-indigo-400 w-5 h-5"></i>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 relative z-10">
        <!-- Tab Kategori -->
        <div class="flex flex-wrap justify-center gap-3 mb-10">
            <button class="filter-pill active px-10 py-4 rounded-xl text-[10px] uppercase tracking-widest" data-category="all">Beranda</button>
            <button class="filter-pill px-10 py-4 rounded-xl text-[10px] uppercase tracking-widest" data-category="Profil">🏫 Profil Sekolah</button>
            <button class="filter-pill px-10 py-4 rounded-xl text-[10px] uppercase tracking-widest" data-category="Hasil Karya">🎨 Karya Siswa</button>
            <button class="filter-pill px-10 py-4 rounded-xl text-[10px] uppercase tracking-widest" data-category="Game Interaktif">🎮 Game Edukasi</button>
        </div>

        <!-- Filter Ruang (Hanya untuk Karya/Game) -->
        <div id="roomFilter" class="mb-12 hidden">
            <p class="text-center text-slate-500 font-bold text-[9px] uppercase tracking-[0.2em] mb-4">Pilih Ruang Kelas</p>
            <div class="flex flex-wrap justify-center gap-2">
                <button class="class-pill active px-5 py-2 rounded-lg" data-class="all">Semua Ruang</button>
                <button class="class-pill px-5 py-2 rounded-lg" data-class="Kelas 1">Ruang 1</button>
                <button class="class-pill px-5 py-2 rounded-lg" data-class="Kelas 2">Ruang 2</button>
                <button class="class-pill px-5 py-2 rounded-lg" data-class="Kelas 3">Ruang 3</button>
                <button class="class-pill px-5 py-2 rounded-lg" data-class="Kelas 4">Ruang 4</button>
                <button class="class-pill px-5 py-2 rounded-lg" data-class="Kelas 5">Ruang 5</button>
                <button class="class-pill px-5 py-2 rounded-lg" data-class="Kelas 6">Ruang 6</button>
            </div>
        </div>

        <div id="loadingState" class="flex flex-col items-center py-20">
            <div class="loader mb-4"></div>
        </div>

        <div id="contentContainer"></div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzuUrihM0YQeMfrVVH34bTa45Y82y4_IK8is0x-NFbOZiEM2Sa4maJbh05TjfgtwH0t/exec"; 
        const API_TOKEN = "RUANG_KREATIF_12_TOKEN";
        
        let currentData = [];
        let activeCategory = 'all';
        let activeClass = 'all';

        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = star.style.height = `${Math.random() * 2}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
                container.appendChild(star);
            }
        }

        window.openLightbox = function(src) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            lightboxImg.src = src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        window.closeLightbox = function() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function formatImageUrl(url) {
            if (!url) return 'https://images.unsplash.com/photo-1594608661623-aa0bd3a67d28?q=80&w=800';
            if (url.includes('drive.google.com')) {
                const idMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                return idMatch ? `https://lh3.googleusercontent.com/d/${idMatch[1]}` : url;
            }
            return url;
        }

        function detectClass(item) {
            if(item.Kelas) return item.Kelas;
            const text = `${item.Judul_Karya} ${item.Deskripsi}`.toLowerCase();
            for(let i=1; i<=6; i++) { if(text.includes(`kelas ${i}`)) return `Kelas ${i}`; }
            return 'Umum';
        }

        window.handleResponse = function(data) {
            document.getElementById('loadingState').classList.add('hidden');
            currentData = Array.isArray(data) ? data : [];
            renderContent();
        };

        function fetchData() {
            const script = document.createElement('script');
            script.src = `${API_URL}?token=${API_TOKEN}&callback=handleResponse&v=${Date.now()}`;
            document.body.appendChild(script);
        }

        window.setTab = function(category) {
            const buttons = document.querySelectorAll('.filter-pill');
            buttons.forEach(btn => {
                if (btn.dataset.category === category) {
                    btn.click();
                    document.querySelector('main').scrollIntoView({ behavior: 'smooth' });
                }
            });
        };

        function renderContent() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const roomFilter = document.getElementById('roomFilter');
            
            if (activeCategory === 'Hasil Karya' || activeCategory === 'Game Interaktif') {
                roomFilter.classList.remove('hidden');
                renderGridView(search);
            } else if (activeCategory === 'Profil') {
                roomFilter.classList.add('hidden');
                renderProfileView(search);
            } else {
                roomFilter.classList.add('hidden');
                renderSchoolView(search);
            }
        }

        function renderProfileView(search) {
            const container = document.getElementById('contentContainer');
            
            const profileItems = currentData.filter(item => 
                item.Kategori === "Tentang Sekolah" && 
                (item.Judul_Karya || "").toLowerCase().includes(search)
            );

            container.innerHTML = `
                <div class="flex flex-col gap-12 max-w-4xl mx-auto">
                    <div class="text-center mb-4">
                        <h2 class="text-3xl font-black text-white mb-4">Biodata & Profil Sekolah</h2>
                        <p class="text-slate-400">Informasi lengkap mengenai SD Negeri 1.2 Kambitin</p>
                    </div>

                    ${profileItems.length > 0 ? profileItems.map(info => `
                        <div class="glass-card p-10 rounded-[2.5rem] border border-indigo-500/20 relative overflow-hidden group">
                            <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/5 rounded-full -mr-16 -mt-16 blur-2xl group-hover:bg-indigo-500/10 transition-all"></div>
                            <div class="flex flex-col md:flex-row gap-8 items-start">
                                <div class="bg-indigo-600/20 p-5 rounded-[1.5rem] shrink-0">
                                    <i data-lucide="book-open" class="w-10 h-10 text-indigo-400"></i>
                                </div>
                                <div>
                                    <h4 class="text-2xl font-black text-white mb-4 tracking-tight">${info.Judul_Karya}</h4>
                                    <div class="text-slate-300 leading-relaxed space-y-4">
                                        ${info.Deskripsi.split('\n').map(p => `<p>${p}</p>`).join('')}
                                    </div>
                                    ${info.Link_Thumbnail ? `
                                        <img src="${formatImageUrl(info.Link_Thumbnail)}" class="mt-8 rounded-2xl w-full max-h-80 object-cover border border-white/10" onclick="openLightbox('${formatImageUrl(info.Link_Thumbnail)}')">
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `).join('') : `
                        <div class="glass-card p-20 text-center text-slate-500 rounded-3xl italic">Informasi profil sedang disusun.</div>
                    `}
                </div>
            `;
            lucide.createIcons();
        }

        function renderSchoolView(search) {
            const container = document.getElementById('contentContainer');
            
            // Filter hanya Berita
            const allNews = currentData.filter(item => 
                item.Kategori === "Berita" && 
                (item.Judul_Karya || "").toLowerCase().includes(search)
            );

            const mainNews = allNews[0];
            const subNews = allNews.slice(1);

            container.innerHTML = `
                <div class="flex flex-col gap-16">
                    <!-- Berita Utama (Headline) -->
                    <section>
                        <h2 class="text-indigo-400 font-black text-[10px] uppercase tracking-widest mb-6">Berita Utama</h2>
                        ${mainNews ? `
                            <div class="glass-card rounded-[2.5rem] overflow-hidden p-6 border-2 border-indigo-500/20 shadow-2xl">
                                <div class="relative group cursor-zoom-in mb-8" onclick="openLightbox('${formatImageUrl(mainNews.Link_Thumbnail)}')">
                                    <img src="${formatImageUrl(mainNews.Link_Thumbnail)}" 
                                         class="w-full aspect-[21/9] object-cover rounded-[1.5rem] border border-white/10 transition-transform duration-500 group-hover:scale-[1.01]" 
                                         onerror="this.src='https://images.unsplash.com/photo-1509062522246-3755977927d7?q=80&w=2000'">
                                    <div class="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center rounded-[1.5rem]">
                                        <div class="bg-black/60 backdrop-blur-md p-4 rounded-full">
                                            <i data-lucide="maximize-2" class="text-white w-6 h-6"></i>
                                        </div>
                                    </div>
                                </div>
                                <h3 class="text-4xl md:text-5xl font-black text-white mb-6 tracking-tight">${mainNews.Judul_Karya}</h3>
                                <p class="text-slate-300 text-lg leading-relaxed italic opacity-90 mb-2">${mainNews.Deskripsi}</p>
                            </div>
                        ` : '<div class="glass-card p-10 text-center text-slate-500 rounded-3xl italic">Berita sedang diperbarui.</div>'}
                    </section>

                    <!-- Berita Lainnya (Grid) -->
                    <section>
                        <h2 class="text-indigo-400 font-black text-[10px] uppercase tracking-widest mb-8 text-center">Berita Lainnya</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${subNews.length > 0 ? subNews.map(item => `
                                <div class="glass-card rounded-3xl overflow-hidden p-4 border border-white/5 flex flex-col cursor-pointer group" onclick="openLightbox('${formatImageUrl(item.Link_Thumbnail)}')">
                                    <div class="relative aspect-video rounded-2xl overflow-hidden mb-4">
                                        <img src="${formatImageUrl(item.Link_Thumbnail)}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/400x225'">
                                        <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                            <i data-lucide="maximize-2" class="text-white w-5 h-5"></i>
                                        </div>
                                    </div>
                                    <h4 class="font-bold text-white text-lg mb-2 line-clamp-2 group-hover:text-indigo-300 transition-colors">${item.Judul_Karya}</h4>
                                    <p class="text-xs text-slate-400 line-clamp-3">${item.Deskripsi}</p>
                                </div>
                            `).join('') : `
                                <div class="col-span-full text-center py-10 text-slate-500 italic">Belum ada berita tambahan.</div>
                            `}
                        </div>
                    </section>
                </div>
            `;
            lucide.createIcons();
        }

        function renderGridView(search) {
            const container = document.getElementById('contentContainer');
            container.innerHTML = `<div id="karyaGrid" class="bento-grid"></div>`;
            const grid = document.getElementById('karyaGrid');
            
            const filtered = currentData.filter(item => {
                const itemClass = detectClass(item);
                const matchSearch = (item.Judul_Karya || "").toLowerCase().includes(search);
                const matchCategory = activeCategory === 'all' || item.Kategori === activeCategory;
                const matchClass = activeClass === 'all' || itemClass === activeClass;
                return (item.Kategori === "Hasil Karya" || item.Kategori === "Game Interaktif") && matchSearch && matchCategory && matchClass;
            });

            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-500 italic">Tidak ada konten ditemukan di ruang ini.</div>`;
                return;
            }

            filtered.forEach(item => {
                const isGame = item.Kategori === "Game Interaktif";
                const itemClass = detectClass(item);
                const card = document.createElement('div');
                card.className = "glass-card rounded-[2rem] overflow-hidden flex flex-col p-4 border border-white/5";
                card.innerHTML = `
                    <div class="relative overflow-hidden aspect-video rounded-[1.2rem] mb-4 bg-slate-800 cursor-zoom-in group" onclick="openLightbox('${formatImageUrl(item.Link_Thumbnail)}')">
                        <img src="${formatImageUrl(item.Link_Thumbnail)}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" onerror="this.src='https://images.unsplash.com/photo-1594608661623-aa0bd3a67d28?q=80&w=800'">
                        <div class="absolute top-2 right-2 px-3 py-1 bg-black/60 backdrop-blur-md rounded-full text-[9px] font-black text-indigo-300 uppercase">${itemClass}</div>
                        <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <div class="bg-black/60 backdrop-blur-md p-3 rounded-full">
                                <i data-lucide="maximize-2" class="text-white w-5 h-5"></i>
                            </div>
                        </div>
                    </div>
                    <div class="px-2 flex-1 flex flex-col">
                        <h3 class="font-bold text-lg text-white mb-2 line-clamp-1">${item.Judul_Karya || 'Tanpa Judul'}</h3>
                        <p class="text-xs text-slate-400 ${isGame ? 'mb-6' : 'mb-2'} line-clamp-2">${item.Deskripsi || '-'}</p>
                        ${isGame ? `
                        <div class="mt-auto">
                            <a href="${item.Link_Media}" target="_blank" class="block w-full py-4 rounded-xl text-center text-[10px] font-black uppercase tracking-widest shadow-xl transition-all active:scale-95 bg-emerald-600 hover:bg-emerald-500 text-white">
                                🎮 Mainkan Game
                            </a>
                        </div>
                        ` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', () => {
            createStars();
            fetchData();
            document.getElementById('searchInput').addEventListener('input', renderContent);
            
            document.querySelectorAll('.filter-pill').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    activeCategory = this.dataset.category;
                    renderContent();
                });
            });

            document.querySelectorAll('.class-pill').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.class-pill').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    activeClass = this.dataset.class;
                    renderContent();
                });
            });

            const slides = document.querySelectorAll('.slide');
            let idx = 0;
            setInterval(() => {
                slides[idx].classList.remove('active');
                idx = (idx + 1) % slides.length;
                slides[idx].classList.add('active');
            }, 5000);
        });
    </script>
</body>
</html>
