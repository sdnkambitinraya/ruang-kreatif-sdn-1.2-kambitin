<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD Negeri 1.2 Kambitin - Portal Resmi</title>

    <script>
        window.tailwind = {
            theme: {
                extend: {
                    screens: { xs: '475px' }
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:wght@700;900&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #7c3aed;
            --gold: #d6b15f;
            --gold-soft: rgba(214, 177, 95, 0.28);
            --glass: rgba(15, 23, 42, 0.7);
            --night-sky: #070b14;
        }

        body {
            margin: 0;
            overflow-x: hidden;
            background: var(--night-sky);
            color: #f1f5f9;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .stars-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px white; }
        }

        .hero-container {
            position: relative;
            display: flex;
            min-height: 70vh;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding-top: 60px;
        }

        .hero-slide {
            position: absolute;
            inset: 0;
            z-index: 0;
            background-position: center;
            background-size: cover;
            opacity: 0;
            transform: scale(1.1);
            transition: opacity 1.5s ease-in-out, transform 8s ease-out;
        }

        .hero-slide.active { z-index: 1; opacity: 0.35; transform: scale(1); }

        .hero-overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
            background: linear-gradient(to bottom, transparent, var(--night-sky));
        }

        .glass-card {
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: var(--glass);
            backdrop-filter: blur(15px);
        }

        .luxury-frame::before {
            content: "";
            position: absolute;
            top: 14px; left: 14px; width: 34px; height: 34px;
            border-top: 1px solid var(--gold); border-left: 1px solid var(--gold);
            pointer-events: none;
        }

        .luxury-frame::after {
            content: "";
            position: absolute;
            bottom: 14px; right: 14px; width: 34px; height: 34px;
            border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold);
            pointer-events: none;
        }

        .filter-pill.active {
            border-color: var(--primary);
            background: linear-gradient(135deg, var(--primary), #5b21b6);
            color: white;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
        }

        .loader {
            width: 40px; height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .tagline-main {
            background: linear-gradient(90deg, #a78bfa, #f472b6, #a78bfa);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }
    </style>
</head>
<body>
    <div class="stars-container" id="starsBox"></div>

    <nav class="fixed top-0 w-full z-50 px-4 py-2">
        <div class="max-w-7xl mx-auto flex justify-between items-center bg-slate-900/80 backdrop-blur-xl rounded-xl px-4 py-2 border border-white/10 shadow-2xl">
            <div class="flex items-center gap-3 cursor-pointer" onclick="setActiveTab('all')">
                <div class="w-10 h-10 border border-white/20 rounded-lg flex items-center justify-center overflow-hidden">
                    <img id="mainLogo" src="" class="w-full h-full object-cover scale-150" alt="Logo">
                </div>
                <div>
                    <h1 class="font-bold text-[10px] md:text-xs text-white uppercase leading-tight">SDN 1.2 Kambitin</h1>
                    <span class="block text-[7px] tracking-widest text-indigo-400 uppercase font-black">Portal Resmi</span>
                </div>
            </div>
            <div class="flex gap-4 text-[9px] font-black uppercase tracking-widest">
                <button onclick="setActiveTab('all')" class="text-white hover:text-indigo-400 transition">Beranda</button>
                <button onclick="setActiveTab('Berita')" class="text-white hover:text-indigo-400 transition">Artikel</button>
            </div>
        </div>
    </nav>

    <header id="hero-section" class="hero-container">
        <div id="slideshow-wrapper" class="absolute inset-0 w-full h-full"></div>
        <div class="hero-overlay"></div>
        <div class="relative z-10 text-center px-6">
            <h1 class="text-4xl md:text-7xl font-black mb-4 tracking-tighter text-white uppercase leading-none">
                SD NEGERI 1.2 <br> KAMBITIN
            </h1>
            <p class="tagline-main italic text-sm md:text-lg max-w-2xl mx-auto">
                "Dari Ruang Kelas Menuju Cakrawala Dunia, Mengukir Prestasi Meraih Masa Depan Gemilang"
            </p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 relative z-10">
        <div id="tab-menu" class="flex justify-center gap-2 mb-12">
            <button class="filter-pill active px-6 py-2 rounded-lg text-[10px] uppercase font-bold tracking-widest bg-white/5 border border-white/10" data-category="all" onclick="setActiveTab('all')">Beranda</button>
            <button class="filter-pill px-6 py-2 rounded-lg text-[10px] uppercase font-bold tracking-widest bg-white/5 border border-white/10" data-category="Berita" onclick="setActiveTab('Berita')">Berita</button>
        </div>

        <div id="loadingState" class="flex flex-col items-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-slate-500 text-[10px] uppercase tracking-widest">Memuat Data...</p>
        </div>

        <div id="main-content-area" class="fade-in"></div>
        <div id="news-detail-view" class="hidden fade-in max-w-4xl mx-auto">
            <button onclick="closeNewsDetail()" class="mb-6 text-indigo-400 font-bold text-xs uppercase tracking-widest">← Kembali</button>
            <div id="news-content-full"></div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxq_QBlXPoFyxsyKHEkFg9JTxG1-OdVZvAWcRJwNgVjCumNQrpvMVC5KvhiI8rdIRc/exec';
        const API_TOKEN = 'RUANG_KREATIF_12_TOKEN';
        const FALLBACK_IMAGE = 'https://images.unsplash.com/photo-1594608661623-aa0bd3a67d28?q=80&w=800';

        let allData = [];

        function formatImageUrl(url) {
            if (!url) return FALLBACK_IMAGE;
            if (url.includes('drive.google.com')) {
                const id = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
                return id ? `https://lh3.googleusercontent.com/d/${id[1]}=s1000` : url;
            }
            return url;
        }

        async function init() {
            try {
                const res = await fetch(`${API_URL}?token=${API_TOKEN}`);
                allData = await res.json();
            } catch (e) {
                console.error("Gagal ambil data", e);
                allData = [{ Kategori: 'Berita', Judul_Karya: 'Halo!', Deskripsi: 'Koneksi gagal, ini data contoh.', Link_Thumbnail: '' }];
            }
            document.getElementById('loadingState').classList.add('hidden');
            renderView('all');
            initStars();
        }

        function renderView(cat) {
            const container = document.getElementById('main-content-area');
            const hero = document.getElementById('hero-section');
            
            hero.style.display = (cat === 'all') ? 'flex' : 'none';
            container.innerHTML = '';

            const filtered = cat === 'all' ? allData : allData.filter(i => i.Kategori === cat);
            
            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-1 md:grid-cols-3 gap-6';
            
            filtered.forEach((item, index) => {
                grid.innerHTML += `
                    <div class="glass-card luxury-frame p-4 rounded-2xl cursor-pointer hover:scale-[1.02] transition" onclick="showDetail(${index})">
                        <img src="${formatImageUrl(item.Link_Thumbnail)}" class="w-full aspect-video object-cover rounded-xl mb-4">
                        <h3 class="font-bold text-white uppercase text-sm">${item.Judul_Karya}</h3>
                        <p class="text-slate-400 text-xs mt-2 line-clamp-2">${item.Deskripsi}</p>
                    </div>
                `;
            });
            container.appendChild(grid);
        }

        window.setActiveTab = (cat) => {
            document.querySelectorAll('.filter-pill').forEach(b => b.classList.toggle('active', b.dataset.category === cat));
            closeNewsDetail();
            renderView(cat);
        };

        window.showDetail = (idx) => {
            const item = allData[idx];
            document.getElementById('main-content-area').classList.add('hidden');
            document.getElementById('news-detail-view').classList.remove('hidden');
            document.getElementById('news-content-full').innerHTML = `
                <h1 class="text-3xl font-serif mb-6">${item.Judul_Karya}</h1>
                <img src="${formatImageUrl(item.Link_Thumbnail)}" class="w-full rounded-3xl mb-8">
                <div class="text-slate-300 leading-relaxed text-lg">${item.Deskripsi}</div>
            `;
            window.scrollTo(0,0);
        };

        window.closeNewsDetail = () => {
            document.getElementById('main-content-area').classList.remove('hidden');
            document.getElementById('news-detail-view').classList.add('hidden');
        };

        function initStars() {
            const box = document.getElementById('starsBox');
            for(let i=0; i<50; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random()*100+'%';
                s.style.top = Math.random()*100+'%';
                s.style.setProperty('--duration', Math.random()*3+2+'s');
                box.appendChild(s);
            }
        }

        init();
    </script>
</body>
</html>
